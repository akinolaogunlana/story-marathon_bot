name: StoryMinta Stealth Viewer
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stealth-view:
    runs-on: ubuntu-latest
    env:
      SUPABASE_TOKEN: ${{ secrets.STORYMINTA_TOKEN }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Puppeteer & Stealth
      run: |
        npm init -y
        npm i puppeteer puppeteer-extra puppeteer-extra-plugin-stealth puppeteer-extra-plugin-user-data-dir --no-package-lock
        
    - name: Fetch & Stealth View Stories
      run: |
        cat > view-stories.js << 'EOF'
        import puppeteer from 'puppeteer-extra';
        import StealthPlugin from 'puppeteer-extra-plugin-stealth';
        import fs from 'fs/promises';
        
        puppeteer.use(StealthPlugin());
        
        async function stealthViewStories() {
          const browser = await puppeteer.launch({
            headless: 'new',
            args: [
              '--no-sandbox',
              '--disable-setuid-sandbox',
              '--disable-dev-shm-usage',
              '--disable-accelerated-2d-canvas',
              '--no-first-run',
              '--no-zygote',
              '--disable-gpu'
            ]
          });
          
          const storiesDir = './viewed-stories';
          await fs.mkdir(storiesDir, { recursive: true });
          
          // Your Supabase stories
          const endpoints = [
            'https://zccvawdmicngfqlkxsoc.supabase.co/functions/v1/stories',
            'https://zccvawdmicngfqlkxsoc.supabase.co/rest/v1/stories?select=*'
          ];
          
          for (const endpoint of endpoints) {
            try {
              const response = await fetch(endpoint, {
                headers: { 'Authorization': `Bearer ${process.env.SUPABASE_TOKEN}` }
              });
              
              if (response.ok) {
                const stories = await response.json();
                console.log(`📖 Found ${stories.length} stories at ${endpoint}`);
                
                for (let i = 0; i < Math.min(3, stories.length); i++) { // Max 3 stories
                  const story = stories[i];
                  const storyUrl = story.url || story.link || endpoint;
                  
                  const page = await browser.newPage();
                  
                  // REALISTIC USER AGENT (iPhone 15)
                  await page.setUserAgent('Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1');
                  
                  // RANDOM viewport + touch emulation
                  await page.setViewport({ width: 390, height: 844 });
                  await page.emulateMediaFeatures([{ name: 'prefers-color-scheme', value: 'light' }]);
                  
                  console.log(`👁️  Viewing: ${story.title || storyUrl}`);
                  
                  // VISIT STORY (3 MINUTE SESSION)
                  await page.goto(storyUrl, { waitUntil: 'networkidle0', timeout: 30000 });
                  
                  // HUMAN-LIKE READING BEHAVIOR
                  await page.evaluate(() => {
                    // Scroll naturally
                    window.scrollBy(0, 300);
                    // Move mouse randomly
                    document.dispatchEvent(new MouseEvent('mousemove', {
                      clientX: Math.random() * 390,
                      clientY: Math.random() * 844
                    }));
                  });
                  
                  // "READ" FOR 3 MINUTES (180 seconds)
                  await page.waitForTimeout(180000);
                  
                  // CAPTURE PROOF
                  const screenshot = await page.screenshot({ fullPage: true });
                  await fs.writeFile(`${storiesDir}/${Date.now()}-${i}.png`, screenshot);
                  
                  await page.close();
                  console.log(`✅ Viewed for 3min: ${storyUrl}`);
                }
              }
            } catch (e) {
              console.log(`⚠️  Error: ${e.message}`);
            }
          }
          
          await browser.close();
          console.log('🎭 Stealth viewing complete!');
        }
        
        stealthViewStories();
        EOF
        
        node view-stories.js

    - name: Commit Proof Screenshots
      run: |
        git config user.name "StoryMinta Viewer"
        git config user.email "viewer@storyminta.com"
        git add viewed-stories/
        if git diff --cached --quiet; then
          echo "No new views"
        else
          git commit -m "👁️ StoryMinta: Viewed 3 stories (3min each) [skip ci]"
          git push
        fi