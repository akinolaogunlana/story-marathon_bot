name: StoryMinta Bot v12.2
on:
  schedule:
    - cron: '*/25 * * * *'
  workflow_dispatch:
jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install deps
      run: pip install selenium==4.15.2 beautifulsoup4 requests lxml fake-useragent
    
    - name: ✅ Setup Chrome 121 + Driver (FIXED)
      run: |
        # Update & install deps
        sudo apt-get update -qq
        sudo apt-get install -y wget unzip xvfb libnss3 libgconf-2-4 libxss1 libasound2
        
        # Chrome 121.0.6167.85 (stable)
        CHROME_URL="https://edgedl.me.gvt1.com/edgedl/chrome/chrome-for-testing/121.0.6167.85/linux64/chrome-linux64.zip"
        wget -q -O chrome.zip "$CHROME_URL"
        unzip -q chrome.zip
        sudo mv chrome-linux64/chrome /usr/local/bin/chrome
        sudo chmod +x /usr/local/bin/chrome
        
        # MATCHING Chromedriver 121
        DRIVER_URL="https://edgedl.me.gvt1.com/edgedl/chrome/chrome-for-testing/121.0.6167.85/linux64/chromedriver-linux64.zip"
        wget -q -O chromedriver.zip "$DRIVER_URL"
        unzip -q chromedriver.zip
        sudo mv chromedriver-linux64/chromedriver /usr/local/bin/
        sudo chmod +x /usr/local/bin/chromedriver
        
        chromedriver --version
        chrome --version
    
    - name: 🚀 Run Bot (STAYS LOGGED IN)
      env:
        EMAIL: ${{ secrets.EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
      run: |
        export DISPLAY=:99
        sudo Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
        sleep 3
        
        echo "Starting bot..."
        python bot.py
