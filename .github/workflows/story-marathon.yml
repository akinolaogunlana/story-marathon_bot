name: Story Credit PROOF
on:
  workflow_dispatch:  # MANUAL ONLY for testing

jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with: python-version: '3.11'
    - name: Install deps
      run: pip install selenium webdriver-manager requests
    - name: Run PROOF bot
      run: python bot.py
      env:
        EMAIL: ${{ secrets.EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
    - name: Upload ALL PROOF screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: proof-screenshots-${{ github.run_id }}
        path: /tmp/*.png
        retention-days: 7
