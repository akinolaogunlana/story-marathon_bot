name: StoryMinta Bot v12.4 ✓✓
on:
  schedule:
    - cron: '*/25 * * * *'
  workflow_dispatch:
jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v4
    
    - name: Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: pip install
      run: pip install selenium beautifulsoup4 requests lxml fake-useragent
    
    - name: ✅ Chromium + Auto Driver (ZERO FAIL)
      uses: nanasess/setup-chromedriver@v2
    
    - name: 🏃 Bot - Login → 120 stories × 3:30
      env:
        EMAIL: ${{ secrets.EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
      run: |
        export DISPLAY=:99
        sudo apt-get install -y xvfb
        Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
        sleep 3
        
        ls -la bot.py
        python bot.py
