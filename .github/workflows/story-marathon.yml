name: Story Marathon v14.0
on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30min
  workflow_dispatch:

jobs:
  marathon:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with: python-version: '3.11'
    - run: pip install selenium webdriver-manager requests lxml
    - run: python bot.py
      env:
        EMAIL: ${{ secrets.EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: marathon-proofs-${{ github.run_id }}
        path: /tmp/*.png
