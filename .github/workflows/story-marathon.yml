name: StoryMinta Bot v12.5 ✓✓✓
on:
  schedule:
    - cron: '*/25 * * * *'
  workflow_dispatch:
jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install deps (Auto Chrome Driver)
      run: |
        pip install selenium beautifulsoup4 requests lxml fake-useragent webdriver-manager
    
    - name: Test files exist
      run: |
        ls -la bot.py
        cat bot.py | head -20
    
    - name: 🚀 Run Bot
      env:
        EMAIL: ${{ secrets.EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
      run: |
        export DISPLAY=:99
        sudo apt-get update -qq
        sudo apt-get install -y xvfb chromium-browser
        Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
        sleep 3
        python bot.py
