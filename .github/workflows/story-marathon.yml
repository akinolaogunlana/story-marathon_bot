name: StoryMinta Bot v14 ⚡

on:
  schedule:
    - cron: '*/25 * * * *'   # every 25 minutes
  workflow_dispatch:         # manual run

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # faster + prevents hanging runs

    steps:
    # ---------------------------
    # 1. Checkout code
    # ---------------------------
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    # ---------------------------
    # 2. Setup Python
    # ---------------------------
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # ---------------------------
    # 3. Install dependencies (NO CHROMIUM, NO SNAP)
    # ---------------------------
    - name: ⚡ Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium webdriver-manager beautifulsoup4 requests lxml

    # ---------------------------
    # 4. Verify bot file exists
    # ---------------------------
    - name: 🔍 Verify Files
      run: |
        ls -la
        head -20 bot.py

    # ---------------------------
    # 5. Run bot
    # ---------------------------
    - name: 🚀 Run StoryMinta Bot
      env:
        EMAIL: ${{ secrets.EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
      run: |
        python bot.py
